name: Publish Package
on:
    workflow_dispatch:

permissions:
    id-token: write # Required for OIDC
    contents: write

jobs:
    publish:
        uses: DCC-BS/ci-workflows/.github/workflows/npm-publish.yml@6d1cca8023e197f6e9cda5e64f3b3f0448f4cf6e # v9
        with:
            install_command: bun install
            build_command: bun run generate
            prepack_command: bun run prepack
